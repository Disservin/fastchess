name: Upload Artifacts

on:
  workflow_call:

jobs:
  Archive:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    env:
      EXT: ${{ matrix.config.ext }}
    strategy:
      matrix:
        config:
          - {
              name: "Ubuntu 22.04 x86-64",
              os: ubuntu-22.04,
              shell: "bash {0}",
              arch: "x86-64",
              platform: "linux",
              target: "x86_64-unknown-linux-musl",
            }
          - {
              name: "Ubuntu 22.04 ARM64",
              os: ubuntu-22.04-arm,
              shell: "bash {0}",
              arch: "arm64",
              platform: "linux",
              target: "aarch64-unknown-linux-musl",
            }
          - {
              name: "Ubuntu 22.04 RISC-V",
              os: ubuntu-22.04,
              shell: "bash {0}",
              arch: "risc-v",
              platform: "linux",
              target: "riscv64gc-unknown-linux-gnu",
              cross: true,
            }
          - {
              name: "MacOS x86-64",
              os: macos-15-intel,
              shell: "bash {0}",
              arch: "x86-64",
              platform: "mac",
              target: "x86_64-apple-darwin",
            }
          - {
              name: "MacOS ARM64",
              os: macos-latest,
              shell: "bash {0}",
              arch: "arm64",
              platform: "mac",
              target: "aarch64-apple-darwin",
            }
          - {
              name: "Windows x86-64",
              os: windows-latest,
              shell: "bash {0}",
              arch: "x86-64",
              platform: "windows",
              target: "x86_64-pc-windows-msvc",
              ext: .exe,
              rustflags: "-C target-feature=+crt-static",
            }
          - {
              name: "Windows ARM64",
              os: windows-11-arm,
              shell: "bash {0}",
              arch: "arm64",
              platform: "windows",
              target: "aarch64-pc-windows-msvc",
              ext: .exe,
              rustflags: "-C target-feature=+crt-static",
            }

    defaults:
      run:
        shell: ${{ matrix.config.shell }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.config.target }}

      - name: Install musl-tools (Linux)
        if: runner.os == 'Linux' && matrix.config.cross != true
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross (RISC-V)
        if: matrix.config.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Extract commit info
        run: |
          echo "COMMIT_SHA=$(git rev-parse --short "$GITHUB_SHA")" >> $GITHUB_ENV
          echo "COMMIT_DATE=$(git show -s --date=format:'%Y%m%d' --format=%cd HEAD)" >> $GITHUB_ENV

      - name: Version replace
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            [ -z "$TAG" ] && exit 0
          fi
          VERSION=$(echo "$TAG" | sed 's/^v//' | sed 's/-alpha$//')
          perl -i -pe "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" app/Cargo.toml

      - name: Build
        run: |
          cd app
          if [ "${{ matrix.config.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.config.target }}
          else
            cargo build --release --target ${{ matrix.config.target }}
          fi
          cp target/${{ matrix.config.target }}/release/fastchess${{ matrix.config.ext }} ../fastchess${{ matrix.config.ext }}
          strip ../fastchess${{ matrix.config.ext }} || true

      # - name: Archive binaries
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: fastchess-${{ matrix.config.platform }}-${{ matrix.config.arch }}
      #     path: |
      #       app
      #       .clang-format
      #       config.json
      #       Makefile
      #       man
      #       README.md
      #       LICENSE
      #       fastchess${{ matrix.config.ext }}
