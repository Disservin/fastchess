name: E2E Tests

on:
  workflow_call:

jobs:
  Tests:
    name: ${{matrix.config.name}}
    runs-on: ${{matrix.config.os}}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Ubuntu 22.04", os: ubuntu-22.04, shell: "bash {0}" }
          - { name: "MacOS Apple Clang", os: macos-latest, shell: "bash {0}" }
          - {
              name: "Windows GCC",
              os: windows-latest,
              msys_sys: "mingw64",
              msys_env: "x86_64-gcc",
              shell: "msys2 {0}",
            }

    defaults:
      run:
        shell: ${{ matrix.config.shell }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installing required packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          clang++ --version
          g++ --version

      - name: Install windows make
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{matrix.config.msys_sys}}
          install: mingw-w64-${{matrix.config.msys_env}} make git expect

      - name: Macos clang version
        if: runner.os == 'Macos'
        run: |
          clang++ --version

      - name: Sanitize Thread E2E Test
        if: runner.os == 'Linux'
        run: |
          make clean
          bash app/tests/e2e/e2e.sh san=thread

      - name: Asan E2E
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          make clean
          bash app/tests/e2e/e2e.sh san=asan

      - name: Normal E2E Setup
        run: |
          make clean
          g++ -O3 -std=c++17 app/tests/mock/engine/random_mover.cpp -o random_mover
          g++ -O3 -std=c++17 app/tests/mock/engine/scripted_result.cpp -o scripted_result
          make -j build=debug

      - name: Opening Book E2E
        env:
          E2E_SKIP_BUILD: 1
        run: bash app/tests/e2e/opening_books.sh

      - name: Engine Diagnostics E2E
        env:
          E2E_SKIP_BUILD: 1
        run: bash app/tests/e2e/engine_diagnostics.sh

      - name: Engine Recovery E2E
        env:
          E2E_SKIP_BUILD: 1
        run: bash app/tests/e2e/engine_recovery.sh

      - name: Rating Interval E2E
        env:
          E2E_SKIP_BUILD: 1
        run: bash app/tests/e2e/rating_interval.sh

      - name: PGN Book Plies E2E
        env:
          E2E_SKIP_BUILD: 1
        run: bash app/tests/e2e/pgn_book_plies.sh

      - name: Random Order E2E
        env:
          E2E_SKIP_BUILD: 1
        run: bash app/tests/e2e/random_order.sh

      - name: Black-To-Move E2E
        env:
          E2E_SKIP_BUILD: 1
        run: bash app/tests/e2e/black_to_move.sh
